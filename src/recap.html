<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>littleGuy — Daily Recap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0f0;
      padding: 24px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #4169E1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 span { color: #7fb3ff; }

    .summary-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .card {
      background: #16213e;
      border: 1px solid #2a2a5a;
      border-radius: 10px;
      padding: 14px 18px;
      flex: 1;
      min-width: 120px;
    }

    .card-label {
      font-size: 0.72rem;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e0e0f0;
    }

    /* Category badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .badge-coding   { background: #1a3a1a; color: #7CFC00; }
    .badge-typing   { background: #1a1a3a; color: #7fb3ff; }
    .badge-active   { background: #2a1a0a; color: #ffaa55; }
    .badge-sleeping { background: #1a0a2a; color: #AAAAEE; }
    .badge-idle     { background: #1a1a1a; color: #888888; }
    .badge-other    { background: #1a1a1a; color: #aaaaaa; }

    section { margin-bottom: 24px; }
    section h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    /* Category chart */
    .cat-bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cat-name {
      width: 80px;
      font-size: 0.8rem;
      text-transform: capitalize;
    }

    .bar-bg {
      flex: 1;
      height: 14px;
      background: #16213e;
      border-radius: 7px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 7px;
      transition: width 0.6s ease;
    }

    .bar-fill-coding   { background: #7CFC00; }
    .bar-fill-typing   { background: #4169E1; }
    .bar-fill-active   { background: #ff8c00; }
    .bar-fill-sleeping { background: #AAAAEE; }
    .bar-fill-idle     { background: #555555; }
    .bar-fill-other    { background: #777777; }

    .cat-time {
      width: 60px;
      text-align: right;
      font-size: 0.78rem;
      color: #8888aa;
    }

    /* App table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #2a2a5a;
      color: #8888aa;
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody tr:hover { background: #16213e; }

    tbody td {
      padding: 7px 8px;
      border-bottom: 1px solid #12122a;
      vertical-align: middle;
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: #555577;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="avatar">🧑‍💻</div>
    <div>
      <h1>littleGuy &mdash; <span id="recap-date">Today</span></h1>
      <p style="font-size:0.8rem;color:#8888aa;margin-top:2px">Your daily activity recap</p>
    </div>
  </header>

  <div class="summary-row">
    <div class="card">
      <div class="card-label">Total tracked</div>
      <div class="card-value" id="total-time">—</div>
    </div>
    <div class="card">
      <div class="card-label">Apps used</div>
      <div class="card-value" id="app-count">—</div>
    </div>
    <div class="card">
      <div class="card-label">Top activity</div>
      <div class="card-value" id="top-activity">—</div>
    </div>
  </div>

  <section>
    <h2>Time by category</h2>
    <div class="cat-bar-wrap" id="cat-bars">
      <div class="no-data">Loading…</div>
    </div>
  </section>

  <section>
    <h2>Apps &amp; windows</h2>
    <table>
      <thead>
        <tr>
          <th>App</th>
          <th>Category</th>
          <th style="text-align:right">Time</th>
        </tr>
      </thead>
      <tbody id="app-table-body">
        <tr><td colspan="3" class="no-data">Loading…</td></tr>
      </tbody>
    </table>
  </section>

  <script src="recap-renderer.js"></script>
</body>
</html>
