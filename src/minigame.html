<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>littleGuy — Minigame</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      user-select: none;
    }
    h1 { font-size: 14px; margin-bottom: 6px; color: #a0c4ff; }
    #info { font-size: 11px; margin-bottom: 8px; color: #aaa; text-align: center; }
    #scoreline {
      display: flex; gap: 20px; margin-bottom: 10px; font-size: 12px;
    }
    #scoreline span { color: #ffd700; }
    #arena {
      position: relative;
      width: 360px;
      height: 260px;
      border: 2px solid #4169e1;
      border-radius: 6px;
      background: #0d0d1a;
      overflow: hidden;
      cursor: crosshair;
    }
    #timer-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 4px;
      background: #4169e1;
      width: 100%;
      transition: width 0.1s linear;
    }
    .target {
      position: absolute;
      width: 40px;
      height: 52px;
      cursor: pointer;
      image-rendering: pixelated;
    }
    #result {
      margin-top: 10px;
      font-size: 13px;
      color: #ffd700;
      min-height: 20px;
      text-align: center;
    }
    #btn-start {
      margin-top: 8px;
      padding: 6px 18px;
      background: #4169e1;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #btn-start:hover { background: #5a7fe8; }
    canvas.target-canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
  <h1>🎮 Whack-a-Guy!</h1>
  <div id="info">Click on the companion before it hides!<br>30 seconds · earn 1 pt per hit · −1 per miss</div>
  <div id="scoreline">
    Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span>
  </div>
  <div id="arena">
    <div id="timer-bar"></div>
  </div>
  <div id="result"></div>
  <button id="btn-start">Start Game</button>

  <script src="minigame-renderer.js"></script>
</body>
</html>
