name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint-and-install:
    name: Lint & Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check for syntax errors (Node.js parse)
        run: |
          node --check main.js
          node --check preload.js
          node --check src/activity-monitor.js
          node --check src/activity-logger.js
          node --check src/sprites.js
          node --check src/companion-store.js
          node --check src/minigame-renderer.js

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-install
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests
        run: npm test --if-present

  build-windows:
    name: Build (Windows NSIS)
    runs-on: windows-latest
    needs: lint-and-install
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: littleGuy-windows-installer
          path: dist/*.exe
          if-no-files-found: warn

  build-linux:
    name: Build (Linux AppImage)
    runs-on: ubuntu-latest
    needs: lint-and-install
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build AppImage
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: littleGuy-linux-appimage
          path: dist/*.AppImage
          if-no-files-found: warn
